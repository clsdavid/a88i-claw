services:
  - type: web
    name: autocrab
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: SETUP_PASSWORD
        sync: false
      - key: AUTOCRAB_STATE_DIR
        value: /data/.autocrab
      - key: AUTOCRAB_WORKSPACE_DIR
        value: /data/workspace
      - key: AUTOCRAB_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: autocrab-data
      mountPath: /data
      sizeGB: 1
