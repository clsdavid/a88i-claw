services:
  autocrab-gateway:
    image: ${AUTOCRAB_IMAGE:-autocrab:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      AUTOCRAB_GATEWAY_TOKEN: ${AUTOCRAB_GATEWAY_TOKEN}
      AUTOCRAB_ALLOW_INSECURE_PRIVATE_WS: ${AUTOCRAB_ALLOW_INSECURE_PRIVATE_WS:-}
      AUTOCRAB_MODEL_PROVIDER: ${AUTOCRAB_MODEL_PROVIDER:-anthropic}
      AUTOCRAB_MODEL_ID: ${AUTOCRAB_MODEL_ID:-claude-opus-4-6}
      AUTOCRAB_CONFIG_GATEWAY_MODE: local
      AUTOCRAB_CONFIG_GATEWAY_CONTROL_UI_ALLOWED_ORIGINS: "*"
      AUTOCRAB_CONFIG_GATEWAY_CONTROL_UI_DANGEROUSLY_ALLOW_HOST_HEADER_ORIGIN_FALLBACK: "true"
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${AUTOCRAB_CONFIG_DIR}:/home/node/.autocrab
      - ${AUTOCRAB_WORKSPACE_DIR}:/home/node/.autocrab/workspace
      ## Uncomment the lines below to enable sandbox isolation
      ## (agents.defaults.sandbox). Requires Docker CLI in the image
      ## (build with --build-arg AUTOCRAB_INSTALL_DOCKER_CLI=1) or use
      ## docker-setup.sh with AUTOCRAB_SANDBOX=1 for automated setup.
      ## Set DOCKER_GID to the host's docker group GID (run: stat -c '%g' /var/run/docker.sock).
      # - /var/run/docker.sock:/var/run/docker.sock
    # group_add:
    #   - "${DOCKER_GID:-999}"
    ports:
      - "${AUTOCRAB_GATEWAY_PORT:-18789}:18789"
      - "${AUTOCRAB_BRIDGE_PORT:-18790}:18790"
    command: ["node", "autocrab.mjs", "gateway", "run", "--bind", "lan", "--allow-unconfigured"]
    init: true
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  autocrab-cli:
    image: ${AUTOCRAB_IMAGE:-autocrab:local}
    network_mode: "service:autocrab-gateway"
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    environment:
      HOME: /home/node
      TERM: xterm-256color
      AUTOCRAB_GATEWAY_TOKEN: ${AUTOCRAB_GATEWAY_TOKEN}
      AUTOCRAB_ALLOW_INSECURE_PRIVATE_WS: ${AUTOCRAB_ALLOW_INSECURE_PRIVATE_WS:-}
      BROWSER: echo
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
    volumes:
      - ${AUTOCRAB_CONFIG_DIR}:/home/node/.autocrab
      - ${AUTOCRAB_WORKSPACE_DIR}:/home/node/.autocrab/workspace
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]
    depends_on:
      - autocrab-gateway
