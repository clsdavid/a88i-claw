<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 16 16" role="img" aria-label="Pixel crab">
  <rect width="16" height="16" fill="none"/>
  
  <!-- legs -->
  <g fill="#3a0a0d">
    <!-- Left legs -->
    <rect x="2" y="7" width="1" height="1"/>
    <rect x="1" y="8" width="2" height="1"/>
    <rect x="2" y="9" width="1" height="1"/>
    <rect x="1" y="10" width="2" height="1"/>
    
    <!-- Right legs -->
    <rect x="13" y="7" width="1" height="1"/>
    <rect x="13" y="8" width="2" height="1"/>
    <rect x="13" y="9" width="1" height="1"/>
    <rect x="13" y="10" width="2" height="1"/>
  </g>

  <!-- body -->
  <g fill="#ff4f40">
    <!-- Main Shell -->
    <rect x="4" y="6" width="8" height="1"/>
    <rect x="3" y="7" width="10" height="3"/> <!-- Rows 7, 8, 9 -->
    <rect x="4" y="10" width="8" height="1"/>
    <rect x="5" y="11" width="6" height="1"/>
    
    <!-- Arm connectors -->
    <rect x="2" y="5" width="2" height="1"/>
    <rect x="12" y="5" width="2" height="1"/>
    
    <!-- Eye bases -->
    <rect x="5" y="5" width="1" height="1"/>
    <rect x="10" y="5" width="1" height="1"/>
  </g>

  <!-- claws -->
  <g fill="#ff775f">
    <!-- Left Claw -->
    <rect x="1" y="2" width="1" height="2"/>
    <rect x="3" y="2" width="1" height="2"/>
    <rect x="1" y="4" width="3" height="1"/>

    <!-- Right Claw -->
    <rect x="12" y="2" width="1" height="2"/>
    <rect x="14" y="2" width="1" height="2"/>
    <rect x="12" y="4" width="3" height="1"/>
  </g>

  <!-- eyes -->
  <g fill="#081016">
    <rect x="5" y="4" width="1" height="1"/>
    <rect x="10" y="4" width="1" height="1"/>
  </g>
  <g fill="#f5fbff">
    <rect x="5" y="3" width="1" height="1"/>
    <rect x="10" y="3" width="1" height="1"/>
  </g>
</svg>
